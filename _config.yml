# Site Settings
title: João Mendes
description: >-
  M365 Development MVP sharing insights on SharePoint Framework, React, TypeScript,
  Microsoft Graph, MCP, and modern Microsoft 365 development.
url: "https://joaojmendes.github.io"
baseurl: "/myblog"
permalink: /blog/:year/:month/:day/:title/

# Author
author:
  name: João Mendes
  email: ""
  url: "https://github.com/joaojmendes"
  twitter: "joaojmendes"
  github: "joaojmendes"
  linkedin: "joaojosemendes"

# Giscus Comments (powered by GitHub Discussions)
# Get repo-id and category-id from https://giscus.app
giscus:
  repo: "joaojmendes/myblog"
  repo_id: "R_kgDORau4rQ"
  category: "General"
  category_id: "DIC_kwDORau4rc4C4HZh"
  mapping: "pathname"
  reactions_enabled: "1"
  theme: "preferred_color_scheme"

# Google Analytics (GA4)
# Replace with your Measurement ID (e.g., G-XXXXXXXXXX)
google_analytics: "G-42SNR7CFVX"

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Collections
collections:
  posts:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "João Mendes"
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE
